<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Copy-Trader Profiles{% endblock %}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           margin: 2rem; color: #222; max-width: 1100px; }
    h1 { font-size: 1.4rem; }
    h2 { font-size: 1.1rem; margin-top: 2rem; }
    table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
    th, td { border-bottom: 1px solid #eee; padding: 0.5rem 0.75rem;
             text-align: left; font-size: 0.9rem; }
    th { background: #f7f7f7; }
    .pos { color: #117a3b; }
    .neg { color: #b22222; }
    .muted { color: #777; font-size: 0.85rem; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 10px;
            background: #eee; font-size: 0.8rem; }
    .pill.discovered { background: #ddd; }
    .pill.shadow { background: #d6e3ff; }
    .pill.paper  { background: #fff1c4; }
    .pill.live   { background: #c4f0d2; color: #0a3318; }
    .pill.disabled { background: #f4cccc; }
    code { background: #f4f4f4; padding: 1px 4px; border-radius: 3px; }
    form.inline { display: inline; }
    button { padding: 4px 10px; cursor: pointer; }
    .nav { margin-bottom: 1rem; font-size: 0.9rem; }
    .skip { color: #aa6600; }
    .alert { color: #b22222; }
    .updated { color: #555; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/profiles">← All profiles</a>
  </div>
  {% block body %}{% endblock %}
</body>
</html>
